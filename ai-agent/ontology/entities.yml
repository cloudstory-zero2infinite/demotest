# Mapper Agent — Entity definitions (semantic contract).
#
# This file defines every entity the Mapper Agent is allowed to create or
# reference when building the Governance knowledge graph in Neo4j.
#
# Rules the agent MUST abide to:
#   1. Only entities listed here are valid node labels in Neo4j.
#   2. For source-backed entities, only the columns listed in `source_columns`
#      may be read from Supabase. All other columns are off-limits.
#   3. Only properties listed under `properties` may be written to Neo4j nodes.
#   4. Every node must carry `org_id` (multi-tenant scoping) — even nodes
#      mirroring globally-scoped tables (e.g. SCFDomain), so the visualizer's
#      per-org subgraph queries stay simple.
#   5. `id_strategy` describes how the agent computes the unique key used in
#      `MERGE` statements — never rely on Neo4j-internal ids.

version: 2

entities:

  Policy:
    description: >
      A policy document owned by an organisation. Two flavours coexist with the
      same label: a single "master" policy per org (Information Security Policy)
      and any number of "child" policies (topic-specific policies such as
      Incident Response, Vulnerability Management, etc.).
    source:
      type: supabase
      table: policy_documents
      org_scope_column: org_id
    source_columns:
      - policy_id
      - name
      - markdown
      - policy_ref
      - policy_status
      - document_type
      - owner_name
      - is_master
      - org_id
      - updated_at
    neo4j_label: Policy
    properties:
      - name: policy_id
        required: true
      - name: name
        required: true
      - name: is_master
        required: true
      - name: policy_ref
      - name: policy_status
      - name: document_type
      - name: owner_name
      - name: org_id
        required: true
      - name: updated_at
    id_strategy:
      keys: [org_id, policy_id]

  SCFDomain:
    description: >
      One of the 33 Secure Controls Framework domains (e.g. GOV — Cybersecurity
      & Data Protection Governance, CHG — Change Management, THR — Threat
      Management). Sourced from the SCF reference workbook the SME uploads via
      the internal-tool Control Framework tab; mirrored into `public.scf_domains`.
      Materialised per-org in Neo4j (every node carries org_id) so per-tenant
      visualizer queries stay clean.
    source:
      type: supabase
      table: scf_domains
      org_scope_column: null              # global — same set of rows for every org
    source_columns:
      - scf_id
      - domain_name
      - principle
      - principle_intent
      - control_count
      - sort_order
    neo4j_label: SCFDomain
    properties:
      - name: scf_id                      # 'GOV', 'CHG', 'THR', ...
        required: true
      - name: domain_name                 # 'Change Management'
        required: true
      - name: principle
      - name: sort_order
      - name: org_id
        required: true
    id_strategy:
      keys: [org_id, scf_id]

  SecurityObjective:
    description: >
      A security objective the master policy asserts (e.g. "Ensure all
      production change requests are reviewed and approved by the CAB before
      deployment"). Extracted by the LLM from the master policy markdown.
      Each objective is mapped by the LLM to one or more SCFDomain ids
      (constrained to the SCF reference list — no free-form domains).
    source:
      type: llm_inferred
    neo4j_label: SecurityObjective
    properties:
      - name: name                        # short title, Title Case
        required: true
      - name: description                 # one-sentence elaboration
      - name: master_policy_id            # scoped under one master per org
        required: true
      - name: org_id
        required: true
      - name: confidence
    id_strategy:
      keys: [org_id, master_policy_id, name]

  OrphanPolicy:
    description: >
      A virtual view label — not a separate Supabase row. A child Policy node
      that ended up with no HAS_CHILD edge from the current master is rendered
      in the visualizer as "orphan". The label is added/removed in Neo4j by
      the mapper after each run.
    source:
      type: derived
    neo4j_label: OrphanPolicy
    properties:
      - name: org_id
        required: true
    id_strategy:
      keys: [org_id, policy_id]
