# Mapper Agent — Recipe for the "policies" trigger.
#
# Binds the generic entity/relationship contract to the specific behaviour
# required when the Mapper Agent is invoked from the Policy tab. Each
# trigger module (capabilities, controls, etc.) will get its own recipe.

version: 2
trigger: policies

# What the agent must read before reasoning.
inputs:
  master_policy:
    description: The single Information Security master policy for the org.
    entity: Policy
    where:
      org_id: ${org_id}
      is_master: true
    cardinality: exactly_one
    on_missing: needs_master_response

  candidate_child_policies:
    description: Every non-master policy in the same org.
    entity: Policy
    where:
      org_id: ${org_id}
      is_master: false
    fields_to_use:
      - policy_id
      - name
      - policy_ref
      - document_type

  scf_domains:
    description: >
      The canonical list of 33 SCF domains (sourced from public.scf_domains).
      The LLM is constrained to map Security Objectives only to scf_ids that
      appear here — no free-form domains allowed.
    entity: SCFDomain
    where: {}                              # global table, no scoping
    cardinality: at_least_one
    on_missing: needs_scf_reference_response

# What the agent must produce. Entities/relationships must match
# entities.yml and relationships.yml.
outputs:
  entities:
    - Org                                  # tenant root (NOT shown in visualizer)
    - SecurityObjective
    - SCFDomain                            # materialised per-org in Neo4j
  relationships:
    - HAS_POLICY                           # org     -> every policy (tenant root)
    - DEFINES                              # master  -> objective
    - MAPS_TO                              # objective -> SCFDomain
    - HAS_CHILD                            # master  -> child policy
    - COVERS                               # child   -> SCFDomain (optional)

extraction:
  model_temperature: 0.2
  response_format: json
  json_schema:
    type: object
    required: [security_objectives, child_policy_links]
    properties:
      security_objectives:
        type: array
        items:
          type: object
          required: [name, scf_ids]
          properties:
            name: { type: string }
            description: { type: string }
            confidence: { type: number, minimum: 0, maximum: 1 }
            scf_ids:
              type: array
              items: { type: string }      # MUST be from the supplied SCF list
      child_policy_links:
        type: array
        items:
          type: object
          required: [policy_id, confidence]
          properties:
            policy_id: { type: string }    # MUST be from candidate_child_policies
            confidence: { type: number, minimum: 0, maximum: 1 }
            rationale: { type: string }
            matched_on: { type: string }
            covers_scf_ids:                # optional cross-links to SCF domains
              type: array
              items: { type: string }      # SCFDomain.scf_id

  instructions: |
    You are the GRC Mapper Agent. You are given:
      (a) The markdown body of an organisation's master Information Security
          policy.
      (b) A list of other candidate policies that already exist in the same
          organisation (the potential CHILD policies).
      (c) The canonical list of SCF (Secure Controls Framework) DOMAINS the
          organisation uses, with their short identifiers (e.g. GOV, CHG,
          THR, IAC). You MUST map only to identifiers from this list — do
          NOT invent new domains, do NOT translate names, do NOT shorten or
          extend identifiers.

    Your job:
      1. Read the master policy markdown and extract the SECURITY OBJECTIVES
         it asserts. An objective is a concrete commitment the policy makes
         (e.g. "Maintain an authoritative inventory of production assets",
         "Ensure all privileged access is reviewed quarterly", "Detect and
         respond to security incidents within defined SLAs"). Use a short
         Title Case name and a one-sentence description grounded in the
         text. Do NOT invent objectives the master does not support.

      2. For each Security Objective, choose the one or more SCF domains
         (by their `scf_id`) that the objective belongs under. An objective
         may legitimately map to several domains — emit all of them in
         `scf_ids`. Every value in `scf_ids` MUST be one of the supplied
         SCF domain identifiers, EXACTLY as written (case-sensitive, no
         trailing whitespace).

      3. From the candidate policies list, decide which ones are the CHILD
         policies of this master. Match on name, policy_ref, document_type
         and overall topic. Provide a one-sentence `rationale` and an honest
         `confidence` in [0,1].

      4. Optionally, for each child policy you link, note which SCF domains
         it primarily covers (`covers_scf_ids`). Same constraint: only ids
         from the supplied list.

      5. Do NOT include any policy_id that is not in the candidates list.
      6. Do NOT emit any scf_id that is not in the supplied SCF domain list.
      7. Return ONLY the JSON object described by the schema. No prose,
         no markdown fences.

# Neo4j write strategy.
write_strategy:
  mode: wipe_and_rewrite                   # clear current master's subgraph
  scope: per_master                        # only this master's edges + inferred nodes
  preserve:
    - Policy                               # children are sourced from Supabase, never deleted
    - SCFDomain                            # global reference, only refreshed by SME upload
  confidence_threshold_for_visualizer: 0.5
