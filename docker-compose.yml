#     build: .
#     ports:
#       - "8080:80"


version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
    command: npm run dev -- --host 0.0.0.0 --port 5173