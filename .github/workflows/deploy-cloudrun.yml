name: Deploy to Cloud Run

on:
  push:
    branches:
      - dev
      - main
      - prod
    # Don't redeploy when a push only touches E2E test assets.
    paths-ignore:
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'playwright-report/**'

env:
  PROJECT_ID: peppy-generator-496509-q7
  REPOSITORY: zti

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      pull-requests: read # resolve the PR title for release notes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set deployment target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.ref_name }}" = "prod" ]; then
            echo "SERVICE=zti-prod" >> $GITHUB_ENV
            echo "REGION=asia-south1" >> $GITHUB_ENV
            echo "IMAGE_NAME=zti-prod" >> $GITHUB_ENV
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
            echo "DEPLOY_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_PROD }}" >> $GITHUB_ENV
            # Frontend + Express share the same Cloud Run URL, so FRONTEND_URL
            # (used by CORS) equals the API base URL.
            echo "DEPLOY_FRONTEND_URL=${{ secrets.VITE_API_BASE_URL_PROD }}" >> $GITHUB_ENV

            # Extract second parent of the merge commit (source commit from main)
            PARENT_SHA=$(git rev-parse --verify HEAD^2 2>/dev/null || echo "")
            if [ -n "$PARENT_SHA" ]; then
              TARGET_SHA=$PARENT_SHA
              # Query the run number of the workflow run that compiled TARGET_SHA
              PREV_RUN_NUMBER=$(gh run list --commit "$TARGET_SHA" --workflow "Deploy to Cloud Run" --json runNumber,status --jq '.[] | select(.status == "completed" or .status == "success") | .runNumber' 2>/dev/null | head -n 1 || echo "")
              [ -z "$PREV_RUN_NUMBER" ] && PREV_RUN_NUMBER=$(gh run list --commit "$TARGET_SHA" --workflow "Deploy to Cloud Run" --json runNumber --jq '.[0].runNumber' 2>/dev/null || echo "")
              if [ -n "$PREV_RUN_NUMBER" ]; then
                RUN_NUMBER=$PREV_RUN_NUMBER
              else
                RUN_NUMBER=${{ github.run_number }}
              fi
            else
              TARGET_SHA=${{ github.sha }}
              RUN_NUMBER=${{ github.run_number }}
            fi
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "SERVICE=dev" >> $GITHUB_ENV
            echo "REGION=asia-south1" >> $GITHUB_ENV
            echo "IMAGE_NAME=dev" >> $GITHUB_ENV
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
            echo "DEPLOY_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_DEV }}" >> $GITHUB_ENV
            echo "DEPLOY_FRONTEND_URL=${{ secrets.VITE_API_BASE_URL_DEV }}" >> $GITHUB_ENV
            TARGET_SHA=${{ github.sha }}
            RUN_NUMBER=${{ github.run_number }}
          else
            echo "SERVICE=pre-prod" >> $GITHUB_ENV
            echo "REGION=asia-south1" >> $GITHUB_ENV
            echo "IMAGE_NAME=pre-prod" >> $GITHUB_ENV
            echo "DEPLOY_ENV=pre-prod" >> $GITHUB_ENV
            echo "DEPLOY_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> $GITHUB_ENV
            echo "DEPLOY_FRONTEND_URL=${{ secrets.VITE_API_BASE_URL }}" >> $GITHUB_ENV
            TARGET_SHA=${{ github.sha }}
            RUN_NUMBER=${{ github.run_number }}
          fi

          SHORT_SHA=$(echo $TARGET_SHA | cut -c1-7)
          echo "APP_VERSION=v$(node -p "require('./package.json').version")+$RUN_NUMBER.$SHORT_SHA" >> $GITHUB_ENV

      - name: Resolve release notes (PR title)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Prefer the title of the PR that introduced this commit; fall back to
          # the commit subject for direct pushes.
          PR_TITLE=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].title // empty' 2>/dev/null || true)
          [ -z "$PR_TITLE" ] && PR_TITLE=$(git log -1 --pretty=%s 2>/dev/null)
          {
            echo "RELEASE_NOTES<<__EOF__"
            echo "$PR_TITLE"
            echo "__EOF__"
          } >> $GITHUB_ENV

      ###########################################
      # Authenticate to Google Cloud
      ###########################################

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      ###########################################
      # Configure Docker
      ###########################################

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      ###########################################
      # Setup Buildx
      ###########################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      ###########################################
      # Build and Push Image
      ###########################################

      - name: Build and Push Docker Image
        run: |
          IMAGE_URI=asia-south1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${{ github.sha }}

          docker buildx build \
            --platform linux/amd64 \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }} \
            --build-arg VITE_AI_AGENT_URL=${{ secrets.VITE_AI_AGENT_URL }} \
            --build-arg VITE_API_BASE_URL=${{ env.DEPLOY_API_BASE_URL }} \
            --build-arg VITE_APP_VERSION="${APP_VERSION}" \
            -t $IMAGE_URI \
            --push .

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      ###########################################
      # Deploy to Cloud Run
      ###########################################

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE_URI \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars \
              SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }},AI_AGENT_URL=${{ secrets.AI_AGENT_URL }},FRONTEND_URL=${{ env.DEPLOY_FRONTEND_URL }},SMTP_HOST=${{ secrets.SMTP_HOST }},SMTP_PORT=${{ secrets.SMTP_PORT}},SMTP_USER=${{ secrets.SMTP_USER }},SMTP_PASS=${{ secrets.SMTP_PASS}},SMTP_FROM=${{ secrets.SMTP_FROM }}

      ###########################################
      # Record the release (Platform Analytics)
      ###########################################

      - name: Record release
        if: always() # log both successful and failed deploys
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          # job.status is success/failure/cancelled; map anything non-success to failed.
          JOB_STATUS: ${{ job.status }}
        run: |
          # Fallbacks in case the job failed before earlier steps set these.
          VERSION="${APP_VERSION:-v0.0.0+${RUN_NUMBER}.$(echo "$GITHUB_SHA" | cut -c1-7)}"
          ENV_NAME="${DEPLOY_ENV:-pre-prod}"
          NOTES="${RELEASE_NOTES:-$(git log -1 --pretty=%s 2>/dev/null)}"
          STATUS="failed"; [ "$JOB_STATUS" = "success" ] && STATUS="success"

          BODY=$(jq -n \
            --arg v "$VERSION" \
            --arg env "$ENV_NAME" \
            --arg st "$STATUS" \
            --arg by "$GITHUB_ACTOR" \
            --arg sha "$GITHUB_SHA" \
            --argjson rn "$RUN_NUMBER" \
            --argjson rid "$RUN_ID" \
            --arg notes "$NOTES" \
            '{version:$v, environment:$env, status:$st, released_at:(now|todate),
              pushed_by:$by, commit_sha:$sha, run_number:$rn, run_id:$rid, notes:$notes}')

          # Non-fatal: a logging hiccup must never fail a deploy.
          curl -s -X POST "${SUPABASE_URL}/rest/v1/release_log" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "$BODY" || echo "::warning::release_log insert failed (non-fatal)"